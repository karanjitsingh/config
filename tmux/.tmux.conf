set-window-option -g mode-keys vi
setw -g aggressive-resize on
set-option -g detach-on-destroy off
# Enable the terminal title update
set-option -g set-titles on

# Set the title format to "tmux: session:window"
set-option -g set-titles-string "tmux: #S:#W @ #h"

# Show session name, window name, and hostname on each pane border
set-option -g pane-border-status top
set-option -g pane-border-format " #{session_name} | #{window_name}:#{pane_current_command} "

set -g visual-bell off
set -g bell-action any
set -g allow-passthrough on

# Resize-pane command aliases (use in command prompt: prefix + :)
set -s command-alias[10] rpd='resize-pane -D'
set -s command-alias[11] rpu='resize-pane -U'
set -s command-alias[12] rpl='resize-pane -L'
set -s command-alias[13] rpr='resize-pane -R'
set -s command-alias[14] rename='select-pane -T'

# prefix + @ : rename the current pane's title (pre-filled with current title)
bind @ command-prompt -I "#{pane_title}" -p "pane title:" "select-pane -T '%%'"

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore session automatically on tmux start
set -g @continuum-restore 'on'
# Save every 15 minutes
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
set -g extended-keys
# set -g extended-keys-format csi-u

